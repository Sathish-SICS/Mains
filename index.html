<style>
:root {
  --paper: #f7f3eb;
  --paper-2: #efe8d8;

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.55; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; font-size: inherit; color: var(--ink); }

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }

.brand { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; color: var(--accent); }
.brand-sub { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--ink-muted); margin-bottom: 24px; }

/* ── Auth bar ── */
.auth-bar { padding: 10px 14px; background: var(--paper); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 20px; font-size: 12px; display: flex; align-items: center; justify-content: space-between; }

function initFirebase() {

      window.dispatchEvent(new Event('auth-change'));
    });
    firebaseReady = true;

}

async function fbLoadNotes(unitId) {
  if (!currentUser || !db) return [];
  const q = query(collection(db, 'users', currentUser.uid, 'notes'), where('unitId', '==', unitId));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
}
async function fbSaveNote(note) {
  if (!currentUser || !db) throw new Error('Not signed in');
  return await addDoc(collection(db, 'users', currentUser.uid, 'notes'), { ...note, createdAt: serverTimestamp() });
}
async function fbDeleteNote(id) {
  if (!currentUser || !db) return;
  await deleteDoc(doc(db, 'users', currentUser.uid, 'notes', id));
}
async function fbUpdateNote(id, updates) {
  if (!currentUser || !db) return;
  await updateDoc(doc(db, 'users', currentUser.uid, 'notes', id), updates);
}
async function fbLoadAnswers() {
  if (!currentUser || !db) return [];

async function callGemini(prompt, imageBase64 = null) {
  const key = state.aiKeys.gemini;
  if (!key) throw new Error('Gemini API key not set. Add it in Settings.');
  const parts = [{ text: prompt }];
  if (imageBase64) parts.push({ inline_data: { mime_type: 'image/jpeg', data: imageBase64 } });
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '(no response)';
}

async function callClaude(prompt, imageBase64 = null) {
  const key = state.aiKeys.claude;
  if (!key) throw new Error('Claude API key not set. Add it in Settings.');
  const content = imageBase64
    ? [{ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } }, { type: 'text', text: prompt }]
    : prompt;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-3-5-sonnet-20241022',
      max_tokens: 2048,
      messages: [{ role: 'user', content }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || '(no response)';
}

async function callOpenAI(prompt, imageBase64 = null) {
  const key = state.aiKeys.openai;
  if (!key) throw new Error('OpenAI API key not set. Add it in Settings.');
  const content = imageBase64
    ? [{ type: 'text', text: prompt }, { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${imageBase64}` } }]
    : prompt;
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      max_tokens: 2048,
      messages: [{ role: 'user', content }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.choices?.[0]?.message?.content || '(no response)';
}

async function callAI(prompt, imageBase64 = null) {
  if (state.selectedAi === 'gemini') return await callGemini(prompt, imageBase64);
  if (state.selectedAi === 'claude') return await callClaude(prompt, imageBase64);
  if (state.selectedAi === 'openai') return await callOpenAI(prompt, imageBase64);
  throw new Error('Unknown AI');
}

function attachEvents() {
  // Tab nav
  document.querySelectorAll('[data-tab]').forEach(b => {
    b.onclick = () => { state.view = b.dataset.tab; state.aiOutput = ''; render(); if (state.view === 'answers') refreshAnswers(); };
  });
  // Unit select
  document.querySelectorAll('[data-unit]').forEach(b => {
    b.onclick = async () => {
      state.activeUnitId = b.dataset.unit;
      state.notes = await fbLoadNotes(state.activeUnitId).catch(() => []);
      render();
    };
  });

  // Action buttons
  document.querySelectorAll('[data-act]').forEach(b => {
    b.onclick = (e) => handleAction(b.dataset.act, b, e);
  });

  // AI select change
  const aiSel = document.getElementById('ai-select') || document.getElementById('ai-select-ans');
  if (aiSel) aiSel.onchange = (e) => { state.selectedAi = e.target.value; localStorage.setItem('selectedAi', state.selectedAi); };

  // File upload
  const uploadZone = document.getElementById('upload-zone');
  const fileInput = document.getElementById('file-input');
  if (uploadZone && fileInput) {
    uploadZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFileUpload(e.target.files[0]);
  }
}

async function handleAction(act, btn, ev) {
  try {
    if (act === 'signin') {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
    } else if (act === 'signout') {
      await signOut(auth);
    } else if (act === 'show-setup') {
      state.view = 'settings'; render();
    } else if (act === 'save-firebase-config') {
      const txt = document.getElementById('firebase-config-input').value.trim();
      try { JSON.parse(txt); } catch { alert('Invalid JSON'); return; }
      localStorage.setItem('firebaseConfig', txt);
      alert('Saved. Reloading...');
      location.reload();
    } else if (act === 'save-keys') {
      document.querySelectorAll('[data-key]').forEach(inp => {
        state.aiKeys[inp.dataset.key] = inp.value.trim();
      });
      localStorage.setItem('aiKeys', JSON.stringify(state.aiKeys));
      alert('API keys saved (in this browser only).');
    } else if (act === 'get-gemini-key') {
      window.open('https://aistudio.google.com/app/apikey', '_blank');
    } else if (act === 'get-claude-key') {
      window.open('https://console.anthropic.com/settings/keys', '_blank');
    } else if (act === 'get-openai-key') {
      window.open('https://platform.openai.com/api-keys', '_blank');
    } else if (act === 'clear-input') {
      state.uploadedFile = null; state.uploadedText = ''; state.aiOutput = '';
      render();
    } else if (act === 'extract') {
      await handleExtract();
    } else if (act === 'generate-structure') {
      await handleGenerateStructure();
    } else if (act === 'save-note') {
      await handleSaveNote();
    } else if (act === 'save-answer') {
      await handleSaveAnswer();
    } else if (act === 'delete-note') {
      if (!confirm('Delete this note?')) return;
      await fbDeleteNote(btn.dataset.id);
      state.notes = await fbLoadNotes(state.activeUnitId);
      render();
    } else if (act === 'edit-note') {
      await handleEditNote(btn.dataset.id);
    } else if (act === 'delete-answer') {
      if (!confirm('Delete this answer structure?')) return;
      await fbDeleteAnswer(btn.dataset.id);
      await refreshAnswers();
      render();
    } else if (act === 'edit-answer') {
      await handleEditAnswer(btn.dataset.id);
    } else if (act === 'export-data') {
      await handleExport();
    }
  } catch (e) {
    alert('Error: ' + e.message);
    state.aiLoading = false;
    render();
  }
}

async function handleFileUpload(file) {
  if (!file) return;
  state.uploadedFile = file;
  if (file.type === 'text/plain') {
    state.uploadedText = await file.text();
  } else if (file.type.startsWith('image/')) {
    // Image: convert to base64 for AI
    const reader = new FileReader();
    reader.onload = () => {
      state.uploadedText = `[Image attached: ${file.name}]`;
      state._imageBase64 = reader.result.split(',')[1];
      render();
    };
    reader.readAsDataURL(file);
    return;
  } else if (file.type === 'application/pdf') {
    state.uploadedText = `[PDF attached: ${file.name}]\n\n(PDF text extraction in browser is limited. For best results, copy-paste the text from your PDF directly into the textarea above, or convert page-by-page to images.)`;
  }
  render();
}

async function handleExtract() {
  const pasted = document.getElementById('paste-input')?.value || '';
  const content = pasted || state.uploadedText || '';
  if (!content && !state._imageBase64) { alert('Provide some content first.'); return; }
  state.aiLoading = true; state.aiOutput = ''; render();
  const prompt = PROMPT_EXTRACT.replace('{CONTENT}', content || '(image attached — extract content from image)');
  state.aiOutput = await callAI(prompt, state._imageBase64 || null);
  state.aiLoading = false;
  render();
}

async function handleGenerateStructure() {
  const q = document.getElementById('question-input')?.value.trim();
  if (!q) { alert('Type a question first.'); return; }
  state.aiLoading = true; state.aiOutput = ''; render();
  state._lastQuestion = q;
  const prompt = PROMPT_ANSWER.replace('{QUESTION}', q);
  state.aiOutput = await callAI(prompt);
  state.aiLoading = false;
  render();
}

async function handleSaveNote() {
  if (!currentUser) { alert('Sign in first.'); return; }
  const title = document.getElementById('note-title')?.value.trim() || 'Untitled note';
  const body = state.aiOutput;
  await fbSaveNote({
    unitId: state.activeUnitId, title, body,
    source: state.uploadedFile?.name || 'pasted-text',
    aiUsed: state.selectedAi
  });
  state.aiOutput = ''; state.uploadedFile = null; state.uploadedText = ''; state._imageBase64 = null;
  state.notes = await fbLoadNotes(state.activeUnitId);
  state.view = 'syllabus';
  render();
}

async function handleSaveAnswer() {
  if (!currentUser) { alert('Sign in first.'); return; }
  const structure = document.getElementById('structure-edit')?.value || state.aiOutput;
  await fbSaveAnswer({
    question: state._lastQuestion || '(no question recorded)',
    structure, aiUsed: state.selectedAi
  });
  state.aiOutput = '';
  await refreshAnswers();
  render();
}

async function refreshAnswers() {
  state.answers = await fbLoadAnswers().catch(() => []);
}

async function handleEditNote(id) {
  const n = state.notes.find(x => x.id === id); if (!n) return;
  const newTitle = prompt('Edit title:', n.title || '');
  if (newTitle === null) return;
  const newBody = prompt('Edit body:', n.body || '');
  if (newBody === null) return;
  await fbUpdateNote(id, { title: newTitle, body: newBody });
  state.notes = await fbLoadNotes(state.activeUnitId);
  render();
}

async function handleEditAnswer(id) {
  const a = state.answers.find(x => x.id === id); if (!a) return;
  const newStruct = prompt('Edit structure:', a.structure || '');
  if (newStruct === null) return;
  await fbUpdateAnswer(id, { structure: newStruct });
  await refreshAnswers();
  render();
}

async function handleExport() {
  if (!currentUser) { alert('Sign in first.'); return; }
  const allNotes = {};
  for (const u of ALL_UNITS) {
    const ns = await fbLoadNotes(u.id);
    if (ns.length) allNotes[u.title] = ns;
  }
  const allAns = await fbLoadAnswers();
  const data = { exportedAt: new Date().toISOString(), notes: allNotes, answers: allAns };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `group1-study-backup-${Date.now()}.json`; a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

});
